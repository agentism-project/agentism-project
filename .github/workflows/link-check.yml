name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/*.md"

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "no"
          config-file: ".github/mlc_config.json"
          folder-path: "."
          file-extension: ".md"
