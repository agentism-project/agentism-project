<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header>
    <nav>
      <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <p>
      Licensed under <a href="{{ "/mit-license" | relURL }}">MIT</a> (code) and
      <a href="{{ "/cc-by-license" | relURL }}">CC-BY 4.0</a> (documents).
      &nbsp;|&nbsp;
      <a href="{{ .Site.Params.repositoryURL }}">GitHub</a>
      &nbsp;|&nbsp;
      <a href="mailto:{{ .Site.Params.authorEmail }}">Contact</a>
    </p>
  </footer>
</body>
</html>
